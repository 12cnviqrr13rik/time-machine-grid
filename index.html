<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MXS4ZNM27S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-MXS4ZNM27S');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME CAPSULE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tooltip" class="tooltip"></div>

<div id="modal-acquisto" class="modal-hidden">
    <div class="modal-content">
        <h3>BUY YOUR TIME PIXEL</h3>
        <p id="data-scelta" style="font-weight: bold;"></p>
        <input type="text" id="input-messaggio" placeholder="Write your message..." maxlength="50">
        <div class="modal-btns">
            <button id="btn-conferma">PAY NOW (1€)</button>
            <button id="btn-chiudi">CANCEL</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>TIME CAPSULE</h1>
    
    <div class="nav-controls">
        <button onclick="cambiaData(-400)">← INDIETRO</button>
        <button onclick="cambiaData(400)">AVANTI →</button>
    </div>

    <!-- Contatore aggiornato -->
    <div id="counter" style="margin-bottom: 20px; color: #fff; font-size: 14px;">
        Pixels claimed: <span id="pixel-count">0</span>/400
    </div>

    <div class="scroller-container">
        <div id="tabellone" class="griglia"></div>
    </div>
    
    <div class="footer-note">
        <p>Each pixel represents one day. Claim your moment in history.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
